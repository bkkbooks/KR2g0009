body:
  text: 紹陶録傳記類二名人之屬提要臣等謹案紹陶録二卷宋王質撰質有詩總聞已著録質於淳煕中奉祠山居以陶潜陶𢎞景皆棄官遺世其同時唐汝舟鹿伯可繼其風因作此書上卷載栗里華陽二譜而各摘其遺文遺事為題别為詞以咏之下巻紀唐鹿事而附以林居詠物之詩其曰山友詞者皆咏山鳥曰水友詞者皆詠水鳥曰山友續詞者皆詠山草曰水友續詞者皆詠水草曰山水友續詞者則襍詠禽蟲諸物盖質以耿直忤時阨於權倖晚嵗欲絶人逃世故以鳥獸草木為友盖亦發憤之作舊於雪山集外别行國朝康熙中商邱宋犖嘗摘録其山友諸詞分為五巻改題曰林泉結契亦取其有寄懐塵外之致也今觀錄中諸作雖惟意所云往往不甚入格然人品既髙神思自别誦其詞者賞之於酸鹹之外可矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1441261dc81e365794ee49e3c0e7fc302b7c8ae91d4ebdebe22c5d81b4acccba
