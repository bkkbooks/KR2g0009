body:
  text: 紹陶録巻上宋王質撰書陶元亮譜元亮髙風發于宋晉去就之際君曽祖事晉懋著勛勞自宋武帝芟元復馬逆揣其末流即不出武帝將收賢士以繫人心見要亦不應陶謝皆世臣君世地色言俱辟而靈運為武帝秉任最後乃欲詭忠義雜江海逺師送君過虎溪而郤靈運不入蓮社素心皆所鑒知譜于左方書陶通明譜通明髙風發于梁齊宋去就之際君祖父皆食宋禄身又生宋代自齊髙祖代宋旋引去梁武帝代齊益退藏平時以師待君然大節有定操豈復以恩禮推移至丹陽應簡文之命不復至京都慰武帝之懐抑何其堅忍壯年果于遺世炤之審故判之不疑譜具左方書栗里華陽閑窩辭淵乎栗里謐哉華陽也當時所歴異代所傷栗里嘗言風波未定巳為剩語華陽單于之詩死而秘篋出之雖本草亦屬去世乃𫝊生安死樂度此足矣安樂之窩伊洛自有乾坤栗里華陽其安樂也巳辭具左方栗里譜興寧三年乙丑晉哀帝君生于潯陽柴桑今徳安縣楚城市是君父軼名命子詩云於穆仁考淡焉虚止寄跡風雲冥于愠喜陶氏自侃以武功擅世後裔稍襲故風多流亂岐盖折翼之祥發之旁𣲖𫝊君父子皆以隱徳著稱侃女適孟嘉嘉女適君父是生君其氣所𫝊造化必有可言者太元元年丙子晉武帝君年十二失母祭妹文云慈妣蚤世我年二六太元九年甲申君年二十失妾楚調詩云弱冠逢世阻始室䘮其偏妻翟氏偕老所謂夫畊于前妻鋤于後當是翟湯家湯莊矯法賜四世以隱行知名亦柴桑人太元十九年甲午君年三十有歸田園居詩云誤落塵網中一去三十年初為州祭酒當在其前不堪乃解歸故云乆在樊籠裡復得返自然尋亦却主簿隆安四年庚子安帝君年三十六五月有從都還阻風規林詩當是參鎮軍銜命自京都上江陵故在始作鎮軍參軍經曲阿詩父在柴桑故云一欣侍温顔又乆留戀所生父為人度不肯適都當是巳舍單行見還舊居詩軍僚差彊郡吏故云時來茍冥㑹宛轡憇通衢􅄬策命晨裝暫與田園踈隆安五年辛丑君年三十七正月有逰斜川詩云開歲倐五日方三十七作五日是當是故歲五月還潯陽今歲七月適江陵有赴假還江陵夜行途中詩留潯陽踰年當是予告在鄉至是往赴云閒居三十載自未參鎮軍以前得三十六年當是不堪勞役遂起歸意故云詩書㪟夙好園林無俗情如何捨此去遥遥至南荆失父祭妹云昔在江陵重罹天罰觸事未逺書疏猶存當是妹自武昌報江陵時父在柴桑元興二年癸夘君年三十九正月有始春懐古田舍詩當是自江陵歸柴桑復適京都宅憂居家思湓城故有懐古田舍又云良苖亦懐新十二月有從弟敬逺詩云寢迹衡門下在都亦當是處野元興三年甲辰君年四十有連雨獨飲詩云僶俛四十年有飲酒詩云是時向立年志意多所耻遂盡介然分拂衣歸田里當是在壬辰癸巳為祭酒之時所謂投來去學仕又云冉冉星氣流亭亭復一紀至是得十二年義熈元年乙已君年四十一三月有自為建威參軍使都經錢溪詩當是故歲自都還里即吉庚子始事鎮軍繼事建威中經罹憂至是得六年復銜命至都其家尚未歸柴桑還舊居詩云疇昔家上京六歲去還歸往來時經鄉閭不常留稍成疎故云阡陌不移舊邑屋或時非履歴周故居隣老罕復遺至是始定居斷他適十一月有歸去來辭九月家留柴桑身住彭澤至是免歸當是不堪軍役故求縣不堪縣役故歸家所謂風波未定心憚逺役彭澤去家百里公田足以為酒少日眷然有歸歟之情平生之志始决見序及辭甚詳失妹所謂情在駿奔自免去職是歲劉將軍録尚書義熈三年丁未君年四十三有祭程氏妹文自乙已至是所謂服制再周義熈四年戊申君年四十四有六月遇火詩云奄出四十年義熈五年巳酉君年四十五有九日詩義熈六年庚戌君年四十六有西田早稻詩義熈七年辛亥君年四十七有祭從弟敬逺文絶粒委務考槃山隂晨採上藥夕閑素琴當是同志見文甚詳義熈十年甲寅君年五十有雜詩云奈何五十年棄官來歸至是得少閒故云荏苒經十載暫為人所羈義熈十一年乙夘君年五十一有與子儼等疏云年過五十又云見樹木交蔭時鳥變聲亦復懽然五六月北窻下卧遇涼風蹔至自謂羲皇上人見疏甚詳義熈十二年丙辰君年五十二有下潠田舍穫詩云曰余作此來三四星火頽當是得此在癸丑甲寅之間義熈十四年戊午君年五十四有楚調詩云僶俛六九年召為著作郎不應是歲朱公為相國元熈元年晉恭帝巳未君年五十五王休元為江州自造不得見遣其故人龎通之等齎酒于望道里要之即引酌野亭休元出與相見極懽竟日嘗九日把菊無酒休元餉之有九日閒居詩所謂秋菊浮園時醪靡至當是未獲所遺休元在江州凡六載未審的在何年自乙巳至丁夘訖死一作絶未嘗他適獨暫為休元入州永初元年宋武帝庚申君年五十六仝隱周續之召至都下為顔延之連挫義熈間檀韶為江州邀續之在城北􅊰禮讐書有示周掾祖謝詩云馬隊非􅊰肆校書亦巳勤願言誨諸子從我潁水濵江城尚不欲周往奚况京師劉遺民亦同隱有和劉柴桑詩挈杖還西廬又云春醪解飢劬其還以春有酧柴桑詩云嘉穟飬南疇又云慨然巳知秋其還至是及秋初自西廬及南村有移居詩云聞多素心人樂與數晨夕又云過門更相呼有酒斟酌之遷居殆為遺民之徒尋適西廬度相去亦不逺與遺民更相酧酢不改賞竒析義之時未審的在何年或恐劉柴桑是縣令劉或嘗為此縣存此呼或有命不為猶續之嘗命為撫軍參軍不就因呼周掾皆不可知但非時為宰者語皆冷交非熱官酧丁柴桑詩云秉直司聰于惠百里此乃當官無疑尋事鍾情于劉過厚于周遺民自隱之餘無聞續之在隱之中㣲婉君與周劉號潯陽三隱校情義稍有淺深是歲宋武帝踐阼景平元年晉營陽王癸亥君年五十九顔延之為始安過潯陽日造飲酣醉臨去留二萬錢悉送酒家相知乆間驟見益歡延之未審何時來柴桑所謂自爾介居及我多暇伊好之洽接簷隣舍當是不詣劉穆之之時又未審何時去柴桑當是為豫章世子參軍之時據誄參𫝊略見元嘉三年宋文帝丙寅君年六十二檀道濟為江州時抱羸疾多瘠餒往候饋以梁肉不受元嘉四年丁夘君年六十三有自祭文云律中無射擬挽歌詩云嚴霜九月中送我出逺郊當是杪秋下世顔延之誄云視化如歸臨凶若吉藥劑弗嘗禱詞非恤其臨終髙態見誄甚詳君平生好談歸蕭統以為處百齡之内居一世之中悠忽白駒寄寓逆旅與大塊而榮枯随中和而放蕩豈能勞于憂畏役於人間最知深心形贈影答神釋本趣略見所謂縱覽大化中不喜亦不懼應盡便須盡無復獨多慮惟患不知既以洞知安坐待此夫復何言杜甫許避俗未許逹道識者更詳之癸夘二月泰山王質譜華陽譜孝建三年宋世祖丙申君生于丹陽秣陵今上元縣冶村是母郝氏夢兩天人持爐焚香來前有娠今世為君再世為孫思邈兩世肇啓于郝故其兆先形當是本居天仙趣報盡還入人趣植根殊凡受形亦異生以火年火月又夏至極陽日悉禀純陽多起飛止累功積行所升當益髙推佛言參君迹略見大明四年庚子君年五歲常持荻盡灰學書泰始元年宋明帝乙已君年十歲得葛洪神仙𫝊即有志飬生語人仰青天睹白日不覺為逺及長博讀書䆳解文武諸伎自後天文地理人事雖至淵妙咸臻底極當時巳罕𫝊歴年愈逺行世寢稀梁𫝊所載十二種今𫝊惟三種𫝊不能紀十種唐志所載九種今𫝊惟四種𫝊有志無八種𫝊無志有五種本草後人増衍攷証益詳間與集注差異元徽三年宋蒼梧王甲寅君年十九蕭將軍録尚書引為諸王侍讀故事止典文學無他務除奉朝請故事止奉朝請召一作有不為官雖在宦途亦居静地及求縣乃不遂縁勢可見永明十年齊世祖壬申君年三十七家貧求宰縣不遂脱朝服挂神武門去止句曲山體極輕㨗性嗜山林所厯必吟咏盤旋不巳語人曰吾見朱門廣厦雖適其華樂而無欲往之心望髙岩瞰大澤知難立止自常欲就之永明中辭禄得遂初服不爾豈得為今日之事亦縁勢使然此語甚真是事先有根次有縁次有勢相符乃人所謂道生之徳畜之物形之勢成之惟難契故曠世難就隆昌元年齊欎林王癸酉君年三十八沈約為東陽累要不至自隠句曲不出所謂遍厯名山求訪仙藥或未然至句章禮育王塔一至丹陽應太子召他適皆未攷又言往東陽從孫逰嶽受符圖經法亦無攷惟楊羲靈寶五符𫝊句容葛粲粲以𫝊陸修静修静以𫝊許翽翽以𫝊孫度度東陽人出都君與遇得之所得止在秣陵句曲之間非逺適而後𫝊永元元年齊東昏侯已夘君年四十四在句曲築樓凡三層身處其上弟子居其中賔客止其下與物遂絶不娶無子他眷亦不通先斷此根可議他事特愛松風庭院皆植松聆響為樂間獨逰泉石此門忌濁便清神仙上景多雲霞下景多山水物多金玉色多紫碧他皆類是所謂熟之飬之覆之若欲成辦必加將䕶大要離塵換境為上中興元年齊和帝辛巳君年四十六蕭都督至新林遣弟子戴猛之迎謁初齊末作水丑木之歌至是援䜟文成梁字令弟子進之遂以梁建國後覆没亦預言朱㸃巳巳詩嘆昭陽重􅄐七元元卒驗雖隱茅山不郤人主訽謀中大通初獻善勝成勝二刀度武帝狃陳慶之覆魏洛陽好大之心寢移參㑹侯景太觸駭機豈盡忘救世者但觀時爾早慕張良甚深黄石編書盖𫝊真秘諜兵法其間餘事推已及物致平緒術此門隱除魔顯定亂學道者聞及君著水鏡握鏡當是早為豈挂晚念天監元年梁髙祖壬午君年四十五梁武帝在西邸與逰及即位恩禮彌篤問訊勿絶屢招不出畫兩牛一放水草之間一金絡頭人執杖驅之知不可復致旁族李直亦不肯事梁武帝常歎梁有天下遂不見此人門風何由乃爾天監四年乙酉君年五十移居積金澗泉石益竒無蛇虎有佳木及雜藥初乏青林及來居皆自茂在句曲東壟中大通元年巳酉君年七十四遇異人宣闓以本草用䖟虫水蛭之屬傷物遲一紀可解形至期果化尸解凡十餘種世𫝊闓自青城來句曲先昇以君聞帝錄其積水之功化後為蓬萊都水監見仙𫝊及拾遺甚詳今茅山相𫝊稍詳但㣲渉異大同二年丙辰君年八十一㕠眼一作兩隻眼或方夣勝力菩薩授菩提記乃詣鄼縣禮育王塔自誓受戒世𫝊吕巖從鍾離權授劍訣後二百年來參黄龍惠南始竟佛言不脩正覺别得生野休止深山大島絶于人境報盡還來歆人諸趣晚年始堅此願唐志有所著艸堂法師𫝊當時佛教雖隆禪宗未開圓覺以大中元年至以是年去留臺城十九日度君不及相見大同六年庚申君年八十五逆尅亡日乃為告逝詩及卒顔色如常香氣彌山華陽頌云號期行當滿實數未終丁迨乃承唐世將賔來聖庭化後一遇丁亥為唐太宗貞觀元年昇平之盛隆古所稀聖庭當是此時初隋文帝輔周以國子博士召孫思邈不應宻言後五十年有聖人出吾且助以濟人宣政元年至貞觀元年適滿五十年應命來見太宗官之不受辭歸太白山風素極類隠居它無種不類形有轉移神無變易自是至丁夘獨孤信鎮洛陽之時正七歲至丁亥太宗召至長安之時得八十七歲暮齡有少容所以驚嗟盧照隣稱其自謂生開皇辛酉當時巳不信若爾豈得聖童之稱博士之召貞觀丁亥方二十七歲豈得少容之歎若言數百歲豈得七歲弱冠之譽度思邈之生適繼隱居之後其為後身何疑挺契頌又云重離儻或似謂簡文與武帝俱非令終又云七元乃扶胥謂武帝凡改元世稱推戴為䇿立侯景嘗為懐朔鎮功曹史至是篡梁稱漢故云扶胥所謂篇中字皆有義㫖後人自篇中字求之則機萌一頌二十字豈其虛設矧又彰明業運又云濟神既有在去留從所宜神既濟矣在于何所華原孫氏即其所在也巳當知佛言報盡還来及㑹生趣生至確可信識者更推之癸夘二月泰山王質譜栗里華陽窩辭移南村辭見集謀居南邨甚乆所謂懐此頗有年今日從兹役戀南村甚堅所謂此理將不勝母為忽去兹未審何時復還西廬所謂山澤乆見招胡事乃躊躇直為親舊故未忍言索居當是居南村柴桑時多柴多桑兮繁隂栗熟兮山前山後而多聞有人兮素心林宻林踈兮溪山自為秋春不見兮相思相思兮起下牀而攬衣南疇兮嘉穟北牖兮新葵轉南村兮西廬夫豈衆芳兮要之何所獨無芳草兮惟吾宇其増菲紛有此内美兮奚適而非良期勿知太元兮又焉知義熈去彭澤辭見集彭澤歸從叔營致當是陶夔官太常君平生下至曲阿上至江陵所謂在昔曽逺逰直至東海隅即為曲阿阿在丹陽至是所謂恐非此名計息駕歸閒居自後不見所之西田下潠兮將荒胡不歸彭澤洵美兮唯柴桑其是思米五斗兮何薄帶一束兮何卑乾坤莽蒼兮懐有道之無期山隩兮江衝魚龍波濤兮蘆人漁子猶怔忡朝上英兮暮下雄山林自有豪杰兮白銀水精之飛龍㳺斜川辭見集鄰曲同㳺無攷劉遺民周續之龎通之龎遵祖企謝景夷羊和齡劉子驥鄉親張野從弟敬逺仲徳見𫝊見集顔延之見誄君親友之情甚敦一作篤停雲詩龎參軍序略見晚息交逰獨悦親戚見歸來辭所以敬徳云亡傷懐深深見文甚詳張野無見風物兮美且閑矯鷗馳魴兮各適所天南阜兮斜川川雖斜兮心不然二隣三曲兮為誰劉即周兮祖謝羊龎皆從而命之閙沙奔兮烟瞀回峰轉兮雲䎖上下湓浦兮無乃丹陽之桀人不恨廬山之弗秀兮恨廬山之弗深穫西田下潠辭見集世事度甚㣲常抱饑窘有乞食詩極哀歸去來辭缾無儲粟有㑹而作序煙火纔通旬日可見平疇兮交逺風良苖兮懐新新欲升兮未升猿鳥兮悲吟饒霜露兮深山風氣兮先城郭而生寒堇不苦兮將辭其實難倍伊蓰周兮又奚著而奚作青山白蓮兮遼遼邈邈矧玉臺兮金闕居句曲山辭見𫝊始棲句曲山立館中茅號華陽隱居南冣髙為大茅北孤峯聚石為小茅中三峯鼎立近後冣髙為中茅同為句曲林屋兮峨嵋岱宗羅浮兮繚之幅員既長兮無極杳烟􅊤兮雲陂谷髙陵深兮矧昭陽穹廬之翻覆萬春千秋兮句曲東麓兮南岡桂椒蕭艾兮同香湛汧溪兮永碧岌菌山兮長蒼移積金澗辭見𫝊大茅中茅長阿中連石為積金今居東面横壟多環石深穴聳壁狹洞皆有湧泉大率冬温夏冷水旱不増減色白味甘美隠居東澗宅與許長史南澗宅冣竒長史即謐又有掾即許翽舍人即揚羲並在旁近三君皆生東晉諸仙故迹多出所𫝊長史御風兮舍人躡雲掾左右兮山髙谷深昔𣺌𣺌兮何世今茫茫兮何代王謝兮埃中楊許兮塵外五明重雲兮咫尺而阻脩東春兮西秋羣芝兮遞芳术花參花兮似不仝人兮焉往藥香無歌兮人生不可以乆留禮育王塔辭見辭傳臨作先用道家制籙鈴藥鈴佩符腋下􅁫符髻上次用佛家儀覆以大袈裟欎袍葛衍桐柏弟子劉顯林等學仙泉法堅等學佛君兼辭于仙特詣極乾坤分呉越兮隔以海潮之飛鴻鵠兮十度而九回朝句曲之嶙峋兮暮育王之嵾嵯垂老逺逰兮豈其舍人長史之非上精行次絶行兮非通行照行之可希天石縱兮天河驚星辰日月兮攲危度錢塘兮江碧而山蒼斯行兮非常築層樓辭見𫝊華陽頌紀居上多種果林蔬圃澣泉石灶亦弗遺未見及樓當是在東澗前居既遷故迹不甚省頌所包羅甚濶偶不及之如欲立碣刻頌安經昭靈臺前頌亦不及經臺樓愈髙兮世愈遥平壤兮層霄松遇風風遇松兮信美而弗迨笙籟兮雲陂波濤兮雪川夢巳隔而弗聞兮矧浮塵之入飛烟樓安得兮袤阜松安得兮穹岩大分有終兮大空無終斯時有羣仙之是從兮它時無一人之與同籃輿柴車見𫝊門生暨兒攑籃輿適廬山為王休元入湓城亦用此見集日暮巾柴車柴桑雖寂寥兮亦扶疎不孤吾烓兮吾車紙筆梨棗兮物計有酒兮聊可與娯洲寒兮桑落乆阻脩兮江淮慘其如昨鶴怨兮猿悲灌卉宿莽兮無依湓城倘可以且泊兮廬山未趣夫來歸舫舟見集舫舟䕃門前有事兮春疇趾垂舉兮攙㳺碕回回兮峪漫漫何楫兮何舟潺湲兮虎溪東林兮逺師溪深兮榜度溪淺兮行歸諦玩兮缺痕逆知兮履綦林有影兮溪無聲露下月明兮過之到家兮掩門噫其不爾兮闔蓬亦可以棲身琴見𫝊有琴無絃以為但得琴中趣何勞絃上聲見集上絃驚白鶴下絃摻孤鸞冩意兮憑聲寄無所兮夫何能陶我心酤我醑我兮勿充豈其餘兮于琴山空兮聲出溪空兮聲澈遲有絃兮何時溪山兮為我流水而白雪虎溪石兮濺濺靈山樹兮欒欒柏下之人巳往兮清吹毋為之輕彈壺觴見集多及壺觴次及杯罇無定器多言濁流嘗言偶有名酒當是艱得至作二十首平生賦詩未有若此其多紓情未有若此其適者尋詩可見乾為天兮為圓有時兮不然醒復醒兮日月皆為之右轉醉復醉兮天勿為之左旋騖遐觀兮北睨斂孤照兮南䀽天下有道則庶人不議兮夫何波浪之瀰漫柯欒欒兮我眄松蕭蕭兮我撫阿衡去我兮已逺我獨歌兮獨舞化無輿兮曷乗盡無宅兮曷歸今茫茫兮何是昨莽莽兮何非鹿皮巾葛巾見𫝊武帝遺鹿皮巾不用後見簡文丹陽以葛巾進謁斕斕兮斑斑毋落落兮其間蒼茸黄精之本兮秋風杳生後而生前山葛兮山巾勿問山中兮君其問諸水濵瀼瀼兮秋露漙蕭蕭兮秋風生浄居永福兮胡可得為孤山之寒人荷荷兮巳矣膠膠兮何耶去復來兮願采􅈋山之藥花笙見𫝊少便馬閑射晚皆捐惟喜聽吹笙山不風兮風不松磕兮自生松風夫何所嗜之太酷兮山林將安為容下坂兮飛鞚袤川兮深弓去彼取此兮但空斯情兮焉窮王母去兮雲歸王子來兮霜霏鳯皇兮驚飛明月在天兮星稀疇昔兮成非是耶非耶焉知栗里車及輿見歸田園等詩其制無考今所用如左山轎繖冝用紫竹斑竹以輕壯為良繖用竹亦如花葉紙梧桐油為頂衣以清滑為良跚跚以出軋軋以趣山攃淺草溪滔深蒲在我窩兮不可傷竹竿潗潗桐油香遮雨遮風遮夕陽栗里杖見和劉柴桑等詩其制無考今所用如左拄杖塵拂子宜用山茶木櫻桃木或紫竹或斑竹白花藤以堅潤為良塵拂子柄用竹眊用白馬尾以輕柔為良溪昏霧多潤即搓挪路㣲石狠弱即擔柯在我窩兮不可㧿十二紅邊千百紅入山轉深春轉濃栗里舟及櫂楫見遇火等詩其制無考今所用如左船篷冝用艑子船拖篷船腰篷船橛頭船又網板船敞槽船多拖潭簊其材冝用桫木櫧木欏木以輕㨗為良篷用雜箬皆可以厚密為良山﨑水嶇無軌可濡草黔木黮無轡可攬在我窩兮不可暌孤篷秋風秋葉飛露冷波寒冝早歸蓑笠背篷冝用藨草在背胸為蓑衣在腰為蓑裙莣繩索領笠冝用箬葉笋籜筋竹背篷亦如之或椶毛為衫笠以鮮宻為良横江斜風零雨其濛無蓑無笠誰適為容在我窩兮不可殃濈濈濕濕麾牛羊負餱轉入魚龍鄉槳櫂橈篙冝用白橚木白植木烏圓木樟木椿木篙冝用筀竹以堅緻為良其擀其盪吾非榜人惟意所向在我窩兮不可擲菌桂木蘭皆不必何材不動能浮碧栗里屨鞋見貧士詩冝用芒草藨草稻草椶毛或用蕦蔴皮藨鮮嫩者號過街新以輕韌為良有黄其總有青其絇岩壑﨑嶇不利走趨在我窩兮不可排白沙何嘗破青鞋柳絮蒲花鋪滿街栗里枕見雜詩枕冝用藤枕竹枕柏枕如胡牀為繩枕如吸筒為藥枕純貯甘菊荆芥良佳它方稍繁難集以輕平為良塊不枕頭防兒來偷疾攑深投安枕長流在我窩兮不可忘無煩酴酥入枕囊但乞野菊花風香栗里杯觴及壺罇見飲酒等詩酒杯冝用貓頭竹根或松根柏根堅老者亦佳筀竹筒柘木馬盂馬瓢長頸葫蘆扁腹葫蘆以輕稳為良松陵木癭草堂竹根草堂不貧仍有瓦盆在我窩兮不可攙自古英豪于此韜或作陷不英不豪杯可銜栗里燭見歸田園詩燭燈冝用松膏樺皮燈冝用烏桕油紵子油菜子油梧桐油無燈艸用紙撚布縷亦可以明澈為良有月未生誰與為朋姑閟我光少須爾明在我窩兮不可陵踈幹一任梢浮雲我自𫝊燈仍續燈栗里衣見歸田園詩衣冝用四垂衫旋襴裙磕膝袴漫襠袴腿袴脚䙀皆用布以簡潔為良芰荷我衣芙蓉我裳秋風易彫相從勿長在我窩兮不可侵薪姑稻姨不可紉樹有㳺絲茒有針栗里巾及冠見飲酒詩巾冝用烏紵青葛冠冝用樺皮槲皮椶皮白藤皮斑竹皮簮冝用箭竹以輕潔為良東莊有紵西莊有葛翾哉附蟬棲我枯茁在我窩兮不可譏斜日西西鳴竹絲暗樹鈎冠休夜歸栗里牀見移居詩牀席薦冝用竹牀松牀席冝用燈草心莞草薦冝用稻艸或蒲艸號蒲盖以潔軟為良晝亦蝴蝶夜亦蝴蝶普天長春芳草無歇在我窩兮不可妨瑇瑁珊瑚終剥牀枕中江漢菰蒲香褥冝用蒲花柳花蘆花青麻布囊之或用零陵香荆芥穗宻編作團以氣一作柔厚為良曲江錦茵白蘋紅巾我茵不文雖吐奚嗔在我窩兮不可驕深陷溪山花柳毛松房竹館棲身牢交牀懶牀冝用筋竹水竹麻絛交縶懶牀用竹用絛皆如之或黄牛草代絛以牢稳為良礤礤其麄㛁㛁其𦂳夫惟無華可與相永在我窩兮不可嗤徑㣲樹繁行稍遲倦即倚牀齁片時栗里案見挽歌詩机椅冝用紫竹黄竹椅冝用竹椅竹机蒲團竹懶椅可負以輕便為良昔氷我眼今雪我身豈惟我身又玉我心在我窩兮不可鄙班坐春莎總吾椅㗳隱春山亦吾机栗里琴見時運詩冝用常琴不必好古尚竒操冝用多怡愉少悲怨多幽淡少繁急不可求𫝊一作博反嬰神勞心以輕緻為良冝竹冝松冝山冝溪有月與風無適不冝在我窩兮不可攖千頭萬緒叢關心纔聞一聲無一星栗里鋤見歸田園詩鋤鏟刀斧冝用鋼為刀黄檀木白橚木為柄以堅利為良我藥務滋我蔬務榮閑卉閑花任其死生在我窩兮不可沉鏟欲平平鋤欲深刀鈎林多錯薪紹陶録巻上
