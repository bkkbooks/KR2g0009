body:
  text: 紹陶録卷下宋王質撰書唐濟民事廬山異人多前聞久寂矣近得一人焉出于士大夫之間可書也巳同年臨川唐君名汝舟字濟民其樂趣可見小名冝僧小字僧兒其樂趣之外又可見也君亦偉哉少業儒事決科年四十有五始有成户掾南康儒官武陵宰蘄春之黃梅居久之易祠官歸湓江人莫知何為也初娶黃繼娶張居無何出隻子贅旁舍無他唐夫婦淡處煢也不求官不治生不接親朋至不見其子人亦莫知何為也臨川豐城湓江量薄有生理官廪亦微有贏資一日盡裒施廬山諸寺及諸庵夫婦往來轉食無定所亦無多時間旬月輒他徙人皆莫知其何為也飲食固隨衆衣服亦不加紉浣不知其何以度寒暑錢幣皆無所挈持不知其何以應緩急也有所遇耶人亦莫知自有所得耶人亦莫知惟不言故不知也或訪求即深避逢者鮮焉終莫知何為也今夫年六十有九婦不知年輕行岩谷甚駛其能與君同固冝皆康強常悅豫從君同里管鏄叔亷得之及從他得皆相符今君不可得見悲夫癸卯正月六日泰山王質書書鹿伯可事士大夫挾才宏者交世深脫然遺之才空則世踈同年鹿君鄉之竒哉君名何字伯可再舉登庚辰甲科資精悍才踔厲微官巳張竒聲二廬陵益著能事遇事如照鏡取形馭吏如聚火燔石也以故臨蒞者多詘體降心接之他所扞格者屬君從容如辨白黑入稍遷為郎駸駸矣無何亟引章求謝事年五十有一也謝公廓然開之與君同自出天台尊事如師資開之承上眷渥甚睨鼎席近矣乘推致趣近列見君退心堅歸辭苦不遺餘力挽之侵尋通簡上意上亦愛憐勿忍使去也君自以喪室家喪兄弟叢哀抱疾他流者以為不舍去無以延于世人皆覺其為辭端不為是也君宰燭知其深情寓直延閣遣之將以感動其有懷而未決而風厲其不然者于邦風豈小補哉君今居鄉強健初無他怡愈良有適也間語所厚曰吾無心酢酬世態爾姑蘇沈繼祖述之君聫官者言之他皆同辭異時同題名大公巨卿班班矣先有濟民後有伯可兩君振此風夫豈無繼之者癸卯正月十五日泰山王質題本自山野無關世資其濶踈固宜周旋簮紱之間拔出亦難晉陶元亮梁陶通明皆棄官遺世者今濟民伯可宦途方通年齡未頽而飄然去之書之為紹陶録云王質題兩同年為余興起山林之心至切矣既書其事巳涉間趣者他辭今附于後山友辭拖白練身全白觜微紅尾長尤鮮白聲清簡又有拖紅練通體深紅拖白練拖白練蒼翠隂中玉一片翻枝倒葉露微茫風動樹鳴忽不見穿向北穿向南山藤野蔓何能纒嗚呼此友兮可解顔溪山繚繞多林巒青菜子身間青緑頭烏腦後一線細白圍之聲清急多苦吟又謂之碧蒿青菜子青菜子林靜山空忽驚耳暗中娟妙度清圓東林吟罷西林起葉青青菜青青飛到山深聲轉清嗚呼此友兮相會心蕭騷野響生寒林泥滑滑身焦黃雜黑斑點如雞而小聲噍急多鳴則有隂雨在篁篠間故又號竹雞泥滑滑泥滑滑林雨林風交颯颯蒼皮翠莢啄鮮香樹外行人何時歇山有果山有蔬楓脂松膠香有餘嗚呼此友兮慰所須野草山花滿地鋪黃栗留身黃而光鮮觜紅而眉黑聲清圓喜啄細青蟲如云動便不喫你黃栗留黃栗留寂寂寞寞傳聲幽桃花吹墮杏花起重疊春岡春樹稠耳聞之心蕭然花飛花落溪潺湲嗚呼此友兮真忘言空山無人春亦寒提葫蘆身麻斑如鷂而小觜彎聲清重初稍緩巳乃大激烈提胡蘆提胡蘆東呼西呼聲不孤豆䓻花繁葡萄踈野香野氣薰薰粗過相煩為我携攢砂點漆苞纍纍嗚呼此友兮堅相期山樊亂蕊霑皴皮屈陸兒身黑觜足皆黃頭有髽張翅有兩白團如毬斂翅則隱如云鬼呌聲清急多傍人呈巧語屈陸兒屈陸兒元無屈陸何呼為雜樹停隂雜花靜相招相喚無人知屈兮陸陸兮屈凌亂衝花花縴絲嗚呼此友兮莫相疑相伴空山深掩扉山和尚身灰褐而長腦觜俱黑聲濁圓間若誦牟尼號者旋雜他聲山和尚山和尚低叢之下髙林上深飛撩動聲稍稍穠翠參差不能障不蘭若不招提丁丁啼罷還棲棲嗚呼此友兮堪同栖鮮枝潤葉漫蒼陂啄木兒身間黑白腹深紅又一種身間青黃腹白觜如錐啄蠧自飽啄木兒啄木兒壁壁剝剝尋幽期山樊深靜眠睡熟樹聲忽鳴林葉飛輕蹙蹙重督督山風槭槭聲漉漉嗚呼此友兮誠相知樹林要深不要稀蘄州鬼身黑觜足俱白聲清急别一聲不類蘄州鬼如云奚啾觜蘄州鬼蘄州鬼江南淮北隔江水淮山巉巉深又深鬼哭浪頭險無比你且鳴我且睡花草薰人令人醉嗚呼此友兮願相逢谷煙溪霧深重重百舌兒身黑觜足皆黃他禽善鳴者輒效之俄傾作數種審聽知其皆此禽百舌兒百舌兒發口及時莫過時柳色花香皆可掇林光水光多足娛花沾舌柳沾舌吟咏山風共山月嗚呼此友兮相追隨樹巔一聲春夢歸不如歸去身灰褐啼極則倒罣春殘多啄紅苞故吻如染血秋深則化為鷂不如歸去不如歸去花稠草繁胡不住春山春林煙日暮山花慘悽無意緒溪可飲林可啄飲啄甘香且為樂嗚呼此友兮勿渝約月明滿野松毬落山樂官身全褐能作歌音又能作拍彈音如喤囉者聲清軟性極從容山樂官山樂官自歌自和間追歡杉風梧月都清圓松煙竹露仍團圞林為管溪為絃深山飛鳴相拍彈嗚呼此友兮冝相諳樹香樹粉山毶毶畫眉兒身褐眉細長而烏觜白形聲皆妍類百舌能雜音而此又能為歌舞畫眉兒畫眉兒林下何須更畫眉莽莽蘿蔓迷東西聲髙聲低聲總竒非真畫即真畫棘刺藤梢時一罣嗚呼此友兮長相陪樹杪聲來樹欲飛雪錢子身白如飛流黃而大尾長頭上一點深黑極鮮未暮即栖見燈火即死又號見燈滅雪錢子雪錢子非雪非錢但相似天清雲淨雪驚飛樹聲才定溪聲起只愛雪不愛錢梨花影下月明前嗚呼此友兮豈相違重花沓葉欒山枝白頭翁身間皂腦上一暈深黑團一點鮮白飛上下不橫斜又號打線子白頭翁白頭翁咀嚼淺紫掐深紅樹枝翻翻跳山狖樹葉駁駁雕山蟲不斜飛不倒挂一絲擲上一絲下嗚呼此友兮久相同半銜蘿月半杉風婆餅焦身褐聲焦急微清每調作三語初如云婆餅焦次云不與喫末云歸家無消息後兩聲若微于初聲婆餅焦婆餅焦深山無事奚多勞青林窈冥卧展轉緑樹蓊欎飛逍遙脆枝弱韌枝強惟聞呼餅不聞香嗚呼此友兮頻相招暮煙漠漠風瀟瀟脫郤布袴身褐立即無聲飛乃鳴雌雄相應先曰脫却後隨曰破袴聲無間斷又如云燒香撥火稍急破類布脫却破袴脫却破袴空潤冥濛濕交股層層山草雜山花刈穫衣裳總無數燒杉香燒楓香菌桂蔓椒紛衆芳嗚呼此友兮毋作踈寒巢幽夢頻相呼郭公身黑聲稍緩如呼郭公音頗重稍急且繁如呼布穀音頗清烈餘聲如呼郭婆郭公郭公上田下田催野翁嬋媛蒼翠錯青紅汪汪活水聲交通蚤布穀蚤收穀稻花垂垂香撲撲嗚呼此友兮真相識麻坡豆坡晚隂濕山鷓姑身青翅赤觜黑足青如雞而小臆前有白團點背間有紫赤毛多鳴即有雨稍緩則如云行不得哥哥山鷓姑山鷓姑林深濃淡交榮枯鈎輈格磔半雲木山谷轉深聲轉孤沙易行泥難行蚤呼春暗回春明嗚呼此友兮同所歸石藤屢罥道人衣水友辭鴛鴦身麻褐雜花點如鴨而小稍長夜傍灘岸雌雄交頸即成睡賦性好思鴛鴦鴦鴛一雌一雄春水鄉缺所思在何方葡萄顔色桃花香溪南岸溪北岸且住中流莫相伴嗚呼此友兮堪同調煙淨波明影可照鸂鶒身雜色雌者白毛間黑花如鴨而小尾有毛如船柁夜停岩穴深栖聲清急鸂鶒鸂鶒水花蕭踈並花立夜倚岩花眠野香平穩溪山總如律春水溫秋水寒攲岸側島隂欒欒嗚呼此友兮常相安虛舟橫渡人搴簾翡翠兒身粉青背上一縷濃翠觜紅腹白如飛流黃而大小者為翠碧巢先極髙後寖低恐墮其雛翡翠兒翡翠兒幽清淨緑深依歸浮空凝風香不動翻身一擲碎花飛總無矰總無弋波上沉浮沙上立嗚呼此友兮冝相從晚瀨一作灘榜人收水功鷺鷥身全白頂上數縷纎毛如絲觜足皆黑頸細長寡鳴將宿則多繁聲一種比鷺鷥稍大觜足皆黃標格差低鷺鷥鷺鷥三花兩花乾雪飛荷花淨紅葉淨碧輕來輕去掠寒霏或孤翔或孤立落日橫波修影直嗚呼此友兮彌相敦水衰石老秋容深江鷗身全白觜足皆紅眉黑飛如鷂立如鴿聲微破而清捕魚頗近于鷺江鷗江鷗茫茫萬波同一秋菰雨蒲風不自由浮世浮生爾更浮一寸白二寸白啄碎波紋聲㶁㶁嗚呼此友兮堪相邀石村沙市江煙遙青樁身青如鵝頸足皆長眉黑腹白觜紅聲差烈而不清亦不迅捷故得樁稱青樁青樁樁樁孤影橫秋江上磯下磯江入腹斜倚亂磧聲淙淙有如癡還不癡波動魚行皎皎知嗚呼此友兮喜同規渚蒲水荇秋風稀野鴨兒身麻褐間斑花如鴨而小亦與鴨同聲雄者頂翅微緑寒則聚他時稍稀野鴨兒野鴨兒長蘆短葦風披披不寒不暖天與睡睡足撲漉橫斜飛飛劃劃鳴軋軋菰蒲澎浡花欲脫嗚呼此友兮奚可闌斷岸欹樹連深山紅鶴身白如雞而大背上一路深褐自頭至尾不斷觜足皆黑觜微彎而長飛則色紅立則色白紅鶴紅鶴東江飛度西江泊蕭蕭晚煙和夜霜寒魚沉波不可啄轉松梢轉松梢孤聲不停危夢搖嗚呼此友兮冝相求付與江天能復留鸕鷀身全黑眉白如鴨而頸極長能入水捕魚夜則棲林又號水老鴉卵生誤傳口吐鸕鷀鸕鷀江煙渺渺波瀰瀰捎空欲下不肯下投深未飛俄急飛碧中食青中眠風吹亂聲譁滿川嗚呼此友兮良可嘉髙紅低紫無乾花魚鷹身全黑觜足皆黃如鵝而小空中視波間甚的捷于他禽聲清烈魚鷹魚鷹江空谷空同一音風浪衝磯磯擦過波沸安能遮眼明忽飛上忽飛下碎玉橫斜口中挂嗚呼此友兮不厭多看看桑田生白波陶河身蒼白觜足皆黑如青樁而大頥下有囊如拳可貯水極護其觜淺深能令水涸魚露故號陶河又號汙澤陶河陶河江文萃蔡搔江莎岸沙岩石相蕩摩異音同流蒸涉波東在梁西在梁繅風紛霧無斜陽嗚呼此友兮相與永島影忽翻水聲併鵁鶄身淡青如鴨而足甚髙故其行輕頂有冠多毛白細而長于樹穴中生雛稍長則銜其翅而學飛鵁鶄鵁鶄嗢咽秋水溞秋聲石樹􅋾􅋾崖稜稜踏蘋蹴藻輕輕行哺兒飢誨兒癡淋滲離樅相挾飛嗚呼此友兮常相存溪子通知魚鳥心魚姑身白間黑花觜足皆黑而長如啄木傍淺水啄細鱗多栖蘆葦間聲焦急魚姑魚姑溪南溪北遙相呼煙深霧重棲沉魚荒荒秋漢秋星疏要姑活怕姑死姑且間飛歇深沚嗚呼此友兮真足稱草平樹安波不興魚燕子身全黑腹麻花如燕而加俊聲清急並岸低飛捕小魚最捷魚燕子魚燕子堇飴不下銀花觜荷香菱香溪清泠涮盡嚏喋全無腥蒲槌黃菰臺黑波痕蕩搖渚花蝕嗚呼此友兮能相寬天生水資歡水賢水鶯子身灰褐間白斑花色如鴨而小不能入水沿岸啄魚蝦聲細急水鶯子水鶯子不愛林花愛溪水春岸春莎翕習飛波動鬛搖缺身墜罱入淺罩入深東渚拋綸西拗罾嗚呼此友兮良相冝水光樹光韜暗輝魚烏子身全黑如鴉觜足皆黃晝傍水啄魚夜鳴雌雄相應如云嗚魚烏子魚烏子相喚相挨擦風葦春莎滲子漸成鱗的皪眼光入波底唼草芽喋楊花勃勃春沫吹春莎嗚呼此友兮冝接迹溪氣溪香午猶濕科斗兒身黑頭濶尾鋭初邏藍成包藉物寄之多淺瀦暗草發藝則叢聒漸變為蜞又變為蝦蟇本形始全科斗兒科斗兒役役聿聿成攢嬉軟溫春水調春泥噆深噆淺隨髙低傍春草傍春石莫向空中亂澄碧嗚呼此友兮良可觀羽葆鼓吹春風前水鴉鵲身間黑白似鵲而小尾長多巢軟荷育雛則寄菱葉弱弗長者為搭水荷捷能髙者為花下荷或暫立少久存聲如鴉而清婉水鴉鵲水鴉鵲軟荷搭水身可泊髙荷修莖難著腳一盤一窩足安樂灶有薪甑有飯蘆人漁子事皆辦嗚呼此友兮冝相倚溪風來定一作寒水香歸寐卑子身麻褐似鴨而小入水捕魚良捷且能久聲如野鴨多穴桑為窠寐卑子寐卑子春菰秋蒲老煙水一雙飛逐一雙飛斜景淨空光陸離戀桃花戀麥黃瓜蔓荻苖皆故鄉嗚呼此友兮冝同方江花吹子魚花香山友續辭枸把花紅紫實紅葉青春苖可食清甘人呼甜菜得名甚多最佳為仙人杖西王母杖我取友兮得枸把左陂花頭野聲起蘘蓑霏雨雜斜陽半濕半乾留春水仙人杖王母杖所思兮可曠野鶯慫慂野花旺黃精花青白子白葉青春苖可食甘腴人呼筆菜根尤美生肥土或如柑瘠土小亦如橘多啖可飽我取友兮得黃精竹葉豆花交野隂人不圖仙只圖飽鴉鵲窠雕龍瓜零白可擷青可捋所思兮何由掇半岩斜陽孟溪潑山藥花白莖紫葉青根可食極美人呼靈􅘂取之默則獲稱謂則無得相傳為靈我取友兮得山藥蝶花開盡鈴子落幾日幾日黃不成􅘂莫日靈施少靈猿父上􅏈子下所思兮安可捨一重空岩一重野甘菊花黃莖紫葉青春苖可食甘香尤冝茶莖青者氣微帶蒿艾號苦意不堪食我取友兮得甘菊髙叢低葉貯清馥石盂幡纚乳花飛錯落紛敷間寒緑入顧渚入蒙山所思兮安可捐椿兒桂子爭芳鮮牛蒡花褐莖如芋殼如栗實如葡萄苖莖皆可食人呼牛菜又號鼠黏子我取友兮得牛蒡稠叢捷鼠走不上深山誰伏又誰牽唇粗舌皴滕頭壯實雖惡食不惡所思兮奚可却松岡竹墩隔沙濼石耳色面黑背紫柔薄生深岩危壁餘木耳地耳皆珍我取友兮得石耳石壁峻嶒下無底非脾非腎非肝腸馬齒馬牙銜不起耳無是耳無非所思兮何可萎石笋石花滋石脂合菌色黑為楮菌最珍白菌紫菌各隨樹而生又茭菌竹菌梭菌蘆菌類甚多産于壞濕地亦多類我取友兮得合菌山深樹底風不進彈子團欒敷未敷飛儡騰猿毋口粗藤花迷豆花肥所思兮焉可遺溪山撩亂將安歸槐芽花黃葉青春芽可食或兔目鼠耳不堪食餘棗芽皂芽櫧芽初嫩皆可食我取友兮得槐芽繚陂灌叢饒雜花才茁嫩莢抽枯丫涎流山鵲并山鴉膠著虻房著蠊所思兮安可芟碧鮮冷淘思露寒蔊頭色褐葉青堅瘦生深山峻壁極辛亦帶微苦稍傷太烈縷蘆蔔雜之皆可食我取友兮得蔊頭猛嚏烈香驚伏蚪石羊石蛇齧不得彈蟹燕蠶胡可偷常風寒常雪寒所思兮奚可堪隂崖湧沫號飛湍山姑花白莖葉皆青木防風春芽可食餘天門冬芽萆薢芽芎芽地黃芽牛膝芽皆可食又號赤腳娘我取友兮得山姑春雨春風沙土蘇山粗屨綻不皴腳祗恐義頭罥花落拜蘋婆揖菜娘所思兮豈可忘苦楝風髙須索防水友續辭蓮子花紅或白房莖葉皆青子外黃中白清脆可食老有他味我取友兮得蓮子月白風清影橫水煙消露飛香愈茂風標宜夜不宜晝薏青青的白白所思兮將焉歇中坻阻躋不可越藕條花紅白葉青根白而圓長方初嫩堪滋羮稍敷冝咀嚼吳人欲肥根稍髠葉朔人號光旁希見之稱我取友兮得藕條花近可招逺可撩龜魚到底亦不見但見紅開乃碧凋風漾漾露霏霏所思兮焉可移光旁聊寄幽并兒雞頭花紫苞莖葉皆青子外緑中白甘韌莖亦美又號雞頭我取友兮得雞頭漪瀾汪洸不肯流雞栖雁栖卑不飛雁或浮上雞何為溪無灑沙無蝨所思兮安有畢濕沙暗蟲聲㖅㖅菱角花黃白子外緑中白四角或兩角紫者皮薄而肌厚尤佳又號水栗我取友兮得菱角碎葉參差水瀺灂重重疊疊庶相鯈雖見噞喁不可捉收壁袋收簧絲所思兮冝相資擦莎挨樹秋蟬啼水粽花白莖紫苞青子如栗根如粽根莖皆可食春採莖秋採根我取友兮得水粽結花甚輕結根重竹筒楝葉瀟湘餘隨波凌亂飄江湖藤籠閉漏兜間所思兮奚可慳蘆岸槿籬門早􅗚水芽兒色黃葉青狀如嬰兒可食味如黃精人呼水黃精我取友兮得水芽荷花為娘藕為爺不聞兒聲聞水聲短崎長溆鳴奔沙霜欲飛水欲歸所思兮不忍欺東波南蕩秋風稀慈菰花白葉青根外黃中白狀如大蒜可食葉如車前者為山慈菰我取友兮得慈菰秋水才沒藏莎餘并州剪刀聊藉姑剪得間花間子踈燕搖尾龍掀鬚所思兮可與娛秋波索索秋聲孤水芹花白根亦白可食葉似芎藭色赤為荻芹又號水英我取友兮得水芹深青淺緑鬖鬖開半沉半浮輕去來溪毛石髮相毰毸健魚赤弱魚碧所思兮不勝積踈煙淡川淨如拭水􅐜花黃白子紫莖赤葉柔滑可食為絲􅐜色似紫菜者為石􅐜冬為豬􅐜龜􅐜古稱苑我取友兮得水􅐜黃黃白白花深深美髯得非龍子孫秋風不退香涎痕東魯思東吳思所思兮冝相詒草木溪山今是非山水友餘辭婆看蠶色黃似屈陸兒雄者先如云婆看蠶一百箔絲車轉雌者次如云作田作掘又來掘初夏多鳴一百箔二百箔千百箔遍村落官絹不厭厚私絹不厭薄婆看蠶婆看蠶蒲桶荷包共作田晚豅秋風搖稻髯鶻嘲身全褐觜足皆黑似畫眉而大罕定蹲且繁鳴聲焦急又號骨雕鶻不挾雕不劂各忀徉毋獝一愁扯花裂二愁踏花折鶻嘲鶻嘲相呼竊脂并博勞同尋念佛婆羅巢銅觜身灰褐腹白觜足皆黃雄者腦黑翅微緑正旅立忽隻起人以嘴黃又名蠟嘴不銀眉不金翅尋馱梁搬草子啄花蠟觜獰啄粟銅觜獰銅觜銅觜春環春嚶好兄弟春喁自飛莫同隊涴鳴身全緑腹白間黑細點花觜足皆黑幸蒙寵聊舂容有水礦無筠筒雪姑擡揌婦巧婦堅正翁涴鳴涴鳴尋花尋柳無山無繁隂漸合春模糊黃頭兒身全黃足白或黑腹白夏多鬭秋消息鏖戰至死不聲以作聲為負山鮑老甘受嘲山婆婆惜得驕子來解腕大頭來間交黃頭兒黃頭兒白黃頭兒有老時鴉線靴頭相伴飛緑毛龜殼褐背生緑毛如青苔甚小菖蒲盆豢之可觀次金線次黑文金線亦小黑文皆常品有絶大者産山為秦龜􅦄龜似太平自開元雖垂老不踰錢只愛緑苔淨勿愛金絲鮮緑毛龜緑毛龜三三八八總不知倣徉露蔣風蒲稀秧雞身全黑觜足皆黑似雞而小聲清微水滿秧生則多集望水白雁來黃隔山拖先拖秧卯子何日圓馬牙何日長秧雞秧雞兩豪狹溪成濶溪螺螄蠼子澎澎肥水潦子身褐腹白觜鋭尾細長似鼠而小依湖岸或湖草為巢又號湖鼠一種竹鼠全與湖鼠不類多傍竹根為窠獺最黠鼠更黠知水情識水脈荷花不禁搯稻花不禁捾水潦子水潦子鷃濫堆隨江風起自伏秋莎噆秋水水划蟲身褐腹白四足兩鬚浮水喋草泥輕跳極駛人呼水馬兒足為棹鬚為撓舴艋子何多勞黑油急旋旋玉掌輕搖搖水划蟲水划蟲鸊鷉鷖鴨同從容寬陂緩波無點風水蛾兒身灰白頭黑四􅛺六足如蠶蛾而小掠水啅飛蚊為食草木蟲化蛾甚多石蠧亦能化此不審何化任霜葉任霜花喋飛蚊味亦佳浪穩無弩狐波平無鈎蛇水蛾兒水蛾兒石婦春風放盡絲松根共掠蘋花飛刺椿花紫如茱萸莖褐通體皆刺獨樹無旁杪梢短苗從顛生深如皂莢芽可食喚春鳥當春呼莫錯呼非茱萸前林迎榆郎後林接榆姑刺椿刺椿黠禽掐捾餘姑存土卵蕨雞無宿根金櫻子花白葉青實黃如山梔而多刺夏殼韜瀋可食深秋尤美冬入藥甚力又號刺梨薔薇花榅桲實多㗘㗱津浥浥椰子亦成酒縮沙亦成蜜金櫻子金櫻子速挽菖蒲出溪水仍招茯苓并逺志甜藤莖淡褐葉青味甘傖人加苦芙雜米為團當春初時多食過上壟即止又號甘藤元姓甘不姓丁引春風含常春雞翁呷甘露祁婆插金稜甜藤甜藤粥香餳白度清明一片春山快活聲苦菜花黃似野菊葉青如苦苣而小莖淡褐似燈心草而大深春莖葉皆可食又號遊冬經寒不萎然不堪食王瓜後靡草前薺却苦荼却甘貝母花哆哆龍葵葉團團苦菜苦菜空山自有間人愛竹筯木瓢越甜煞甜椎花白葉青樹甚壯秋結實殼黑肌白人呼烏圓子苦者殼褐毬皆類栗但無刺花成穗子成毬雅相似終非儔茅栗低坡尾旋栗髙岡頭甜椎甜椎秋後秋樹倚斜暉苦者擲與看牛兒蓼米花紅莖葉皆青多節花謝子結如粟可食晚秋人多採又有菰米蘆米葭米草木實間有韞米者御米甚佳蛇米不可食無馬纒無蝦鬚羅裙帶色色無願花變流沙願花變穿珠蓼米蓼米秋風易搖入秋水大平中期難屈指水芋頭莖葉皆青葉圓而大春深水生則抽莖可食根如薑芋外褐中白不堪食不粵卵不岫鴟雖沉波堪作魁葧臍葉搓牙芥蒩苖整齊水芋頭水芋頭江湖百年無一愁南灣北灣皆膳羞蔞蒿莖青近山多赤葉亦青杪冬發土取啖多土氣初春抽莖清脆可食盛夏成蒿能辟蚊皤老白角子烏爾未萌我巳敷蘆笋茁戢戢荻笋抽擢擢蔞蒿蔞蒿風枝兩葉老蕭蕭草堂黍氏不得驕紹陶録卷下
